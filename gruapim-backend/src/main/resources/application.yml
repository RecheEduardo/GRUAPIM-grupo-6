spring:
  application:
    name: gruapim-backend
  profiles:
    active: dev
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    com.gruapim: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
