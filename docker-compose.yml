services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gruapim
      POSTGRES_USER: gruapim
      POSTGRES_PASSWORD: gruapim123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gruapim -d gruapim"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./gruapim-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/gruapim
      DB_USER: gruapim
      DB_PASSWORD: gruapim123
      JWT_SECRET: docker-local-secret-key-at-least-256-bits-long-for-hs256-replace-in-real-prod
      JWT_EXPIRATION: 86400000
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
