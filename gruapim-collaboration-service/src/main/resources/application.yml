spring:
  application:
    name: gruapim-collaboration-service
  profiles:
    active: dev
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  # Porta dedicada — o monólito gruapim-backend permanece em 8080.
  port: 8081
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.gruapim.collaboration: INFO
    org.springframework.security: INFO
